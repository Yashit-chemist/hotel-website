<!DOCTYPE html>
<html>
<head>
    <title>Hotel Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <button id="leftArrow" onclick="prevHotel()">❮</button>

    <div class="container">

        <h1 id="hotelName"></h1>

        <img id="hotelImage">

        <div id="price"></div>

        <p id="description"></p>

        <h2>Comments</h2>

        <div id="comments"></div>

        <iframe
            id="hotelMap"
            width="100%"
            height="500"
            style="border:0"
            loading="lazy">
        </iframe>

    </div>

    <button id="rightArrow" onclick="nextHotel()">❯</button>

    <script src="script.js"></script>

</body>
</html>
