<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Vermas & Tyagis Hotels</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Hotel Navigation -->

    <button id="hotelPrev" onclick="prevHotel()">
        ❮
    </button>

    <button id="hotelNext" onclick="nextHotel()">
        ❯
    </button>

    <div class="container">

        <h1 id="hotelName"></h1>

        <!-- IMAGE GALLERY -->

        <div class="gallery">

            <button class="imageArrow" onclick="prevImage()">
                ❮
            </button>

            <img id="hotelImage">

            <button class="imageArrow" onclick="nextImage()">
                ❯
            </button>

        </div>

        <div id="imageCounter"></div>

        <div id="commentsSection">

            <h2>Comments</h2>

            <div id="comments"></div>

        </div>

        <div id="pdfSection">

            <h2>Documents</h2>

            <div id="pdfContainer"></div>

        </div>

        <div id="locationSection">

            <h2>Location</h2>

            <iframe
                id="hotelMap"
                width="100%"
                height="500"
                loading="lazy">
            </iframe>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
